services:
  - type: web
    name: beatapi
    runtime: docker
    repo: https://github.com/Beat-All-Repo/BeatAPI.git
    plan: free
    branch: main
    envVars:
      - key: PORT
        value: 4000
      - key: ANIWATCH_API_PORT
        value: 4000
      - key: ANIWATCH_API_DEPLOYMENT_ENV
        value: render
      - key: NODE_ENV
        value: production
      - key: ANIWATCH_API_CORS_ALLOWED_ORIGINS
        value: "*"
